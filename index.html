<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora </title>
</head>
<body>
    <h1> Nhayara</h1>
    <div class="Calculadora">
        <input type="text" disabled id="display"">
        <div class="box-buttons">
            <button>C</button>
            <button>&LT;</button>
            <button>/</button>
            <button>*</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="btn-zero">0</button>
            <button>.</button>
            <button class="btn-result">=</button>

            
        </div>
    </div>
</body>
</html>
